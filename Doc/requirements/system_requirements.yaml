# NeoCombi System Requirements
# Format: function = Verb + Object. Scenarios = Context -> Action -> Outcome (not Gherkin).
# parent: list of UR ids that this SR realizes.
# Categories (group by 10s):
#   dsl_authoring        SR-001..009
#   factor_level_table   SR-010..019
#   bottom_pane          SR-020..029
#   forbidden_view       SR-030..039  (built-in evaluator + reference matrix)
#   coverage_view        SR-040..049  (top-pane exhaustive matrix; SR-044 = count-flag gating, UR-010)
#   test_case_table      SR-050..059  (test cases + notes + ids + count flag; SR-054..056, UR-005/010)
#   pict_invocation      SR-060..069  (external PICT CLI)
#   persistence          SR-070..079  (.tmodel file I/O; SR-072 persisted set, SR-073 destructive guard, UR-011)
#   cli_mode             SR-080..089  (CI/CD pipeline use)
#   mask_level           SR-090..099  (UR-008 — mask-level authoring assistance)
#   all_combinations     SR-100..109  (UR-009 — decision-table: full Cartesian, forbidden marked;
#                                       GUI/CLI/API deployments of one pure core)
# UR-007 (NL -> AI -> DSL) is intentionally not realized by any SR yet; deferred to v2.

version: "0.2-draft"
last_updated: "2026-06-21"

# =============================================================================
# DSL Authoring (parent: UR-002)
# =============================================================================
# The DSL is the PICT BNF subset defined in DSL_Grammar_Specification.md.
# DSL is the single source of truth for factors, levels, and constraints.

requirements:
  SR-001:
    parent: [UR-002]
    category: dsl_authoring
    function: "Edit DSL text in editor"
    scenarios:
      - context: "DSL tab is active in the bottom pane"
        action: "User types DSL text"
        outcome: "Text buffer is updated and re-validated"
      - context: "DSL is empty"
        action: "User opens DSL tab"
        outcome: "Show empty editor with placeholder hint linking to DSL_Grammar_Specification.md"

  SR-002:
    parent: [UR-002]
    category: dsl_authoring
    function: "Validate DSL syntax in real time"
    scope: |
      Validation covers the MVP subset only: parameter declarations, constraint
      clauses (IF/THEN/ELSE), comparison operators (=, <>, >, >=, <, <=),
      logical operators (AND/OR/NOT), and IN { }. LIKE, submodels, weights,
      and negative-value markers are reported as "unsupported in MVP" errors.

      Constraint Value positions (the right-hand side of comparisons and the
      members of an IN { ... } clause) accept only quoted strings or numbers
      — bare identifiers are rejected as syntax errors. This mirrors PICT's
      own rule: PICT rejects bare values in constraints with `Incorrect
      numeric value`, so accepting them in our DSL would silently produce
      DSL that fails at PICT-invocation time. Catching it at parse time
      keeps the DSL a true subset of PICT (per ADR-001) and surfaces the
      problem with editor-position information instead of a runtime error.
    scenarios:
      - context: "User edits DSL"
        action: "Editor content changes"
        outcome: "Parse incrementally; valid AST is held for downstream views"
      - context: "DSL contains syntax error"
        action: "Validation runs"
        outcome: "Mark error position; downstream views (forbidden / coverage / test cases) hold their last valid state"
      - context: "DSL uses LIKE / submodel / weight / negative-value"
        action: "Validation runs"
        outcome: "Report 'unsupported in MVP' diagnostic with link to grammar spec"

  SR-003:
    parent: [UR-002]
    category: dsl_authoring
    function: "Display syntax errors with location"
    scenarios:
      - context: "Validation produces errors"
        action: "Editor renders"
        outcome: "Underline error span; show message and grammar-spec reference on hover"
      - context: "Multiple errors exist"
        action: "Editor renders"
        outcome: "List errors in a side panel; clicking an entry jumps the cursor to that span"

  SR-004:
    parent: [UR-002]
    category: dsl_authoring
    function: "Validate constraint references against declared parameters and levels"
    scope: |
      A separate semantic pass runs after the syntax parse and walks every
      constraint's predicates. It reports two error kinds:
        - unknown-parameter: a `[Name]` reference that is not declared as a
          parameter, on either side of a comparison or in an IN clause.
        - unknown-level: an `=` / `<>` comparison or an IN-clause value that
          is not present in the referenced parameter's declared level set.
      Ordering operators (>, >=, <, <=) are intentionally exempt so numeric
      factors can be compared against out-of-set numbers (PICT permits this).
      Parameter-to-parameter equalities (`[A] = [B]`) only check that both
      parameters exist; they do not cross-check level sets, since values are
      compared at evaluation time.
    scenarios:
      - context: "A constraint compares a factor against a level value"
        action: "Validation runs"
        outcome: "If the level is not declared on the factor, mark an unknown-level error at the literal's range with the declared set listed for context"
      - context: "A constraint references an undeclared parameter"
        action: "Validation runs"
        outcome: "Mark an unknown-parameter error at the [Name] reference"
      - context: "All references resolve to declared parameters and levels"
        action: "Validation runs"
        outcome: "No semantic diagnostics are emitted; downstream views proceed with the parsed model"

# =============================================================================
# Factor / Level Table (parent: UR-002)
# =============================================================================
# The factor-level table is a structured view of the DSL parameter section.
# Edits in either view are reflected in the other.

  SR-010:
    parent: [UR-002]
    category: factor_level_table
    function: "Manage factors"
    scenarios:
      - context: "Factor-Level tab is active"
        action: "User adds a factor"
        outcome: "New factor row appears; DSL parameter section gains a corresponding declaration"
      - context: "Factor row is selected"
        action: "User renames the factor"
        outcome: "Identifier updates in DSL and in all constraints / test cases / matrices that reference it"
      - context: "Factor row is selected"
        action: "User removes the factor"
        outcome: "Show confirmation listing dependent constraints; on confirm, remove factor and update / remove dependent constraints"

  SR-011:
    parent: [UR-002]
    category: factor_level_table
    function: "Manage levels per factor"
    scenarios:
      - context: "Factor row is expanded"
        action: "User adds a level"
        outcome: "New level appears; DSL parameter declaration gains the new level value"
      - context: "Level cell is selected"
        action: "User renames the level"
        outcome: "Identifier updates in DSL and in all constraints / test cases / matrices that reference it"
      - context: "Level cell is selected"
        action: "User removes the level"
        outcome: "Show confirmation listing dependent constraints; on confirm, remove level and update / remove dependent constraints"

  SR-012:
    parent: [UR-002]
    category: factor_level_table
    function: "Synchronize factor-level table with DSL"
    scenarios:
      - context: "User edits DSL parameter section"
        action: "DSL is reparsed successfully"
        outcome: "Factor-Level table view re-renders to reflect the new declaration set"
      - context: "User edits Factor-Level table"
        action: "Edit is committed"
        outcome: "DSL parameter section is regenerated preserving comments and constraint section verbatim"
      - context: "DSL parse fails"
        action: "User edits Factor-Level table"
        outcome: "Defer commit until DSL parses; show notice in the table view"

# =============================================================================
# Bottom Pane Layout (parent: UR-002)
# =============================================================================

  SR-020:
    parent: [UR-002]
    category: bottom_pane
    function: "Switch bottom-pane tab"
    tab_set:
      - "Factors & Levels"
      - "DSL"
      - "Test cases"
    future_extension: |
      "Natural-language requirements" tab is added when AI integration mode
      is enabled (UR-007 / v2). The tab container is designed to accommodate
      this without rework.
    scenarios:
      - context: "Bottom pane is displayed"
        action: "User clicks a tab header"
        outcome: "The selected tab's content replaces the visible content"
      - context: "User switches tabs while editing"
        action: "Tab switch occurs"
        outcome: "Edits in the previous tab are preserved (no implicit save / discard)"

# =============================================================================
# Forbidden-Combination View (parent: UR-003)
# =============================================================================
# Reference view, not an input source. Computed by the built-in DSL evaluator,
# not by invoking PICT. The DSL is the intensional form; this view is the
# extensional form derived from it.

  SR-030:
    parent: [UR-003]
    category: forbidden_view
    function: "Compute N-factor forbidden combinations from DSL"
    note: |
      Built-in evaluator. PICT is not invoked for this computation.
      Free-factor enumeration is scoped to the transitive closure of
      "co-occurs in some constraint" starting from the slice's factors;
      factors outside that closure are not enumerated since they cannot
      affect the slice's feasibility (assuming a globally satisfiable
      model). See ADR-012 for the algorithm rationale. This keeps the
      computation tractable on 100+ factor models with sparse constraints.
    scenarios:
      - context: "DSL is valid"
        action: "User selects N and a slice (condition factors + constrained factor)"
        outcome: "Evaluator enumerates the slice's reachable closure and marks each cell forbidden / allowed by evaluating the constraints inside that closure"
      - context: "DSL is invalid"
        action: "Slice is selected"
        outcome: "Hold last valid result; display 'DSL has errors' notice"
      - context: "Slice's reachable closure is too large to enumerate"
        action: "Computation starts"
        outcome: "Cancel with size warning; suggest reducing N or factor cardinalities, or splitting the constraint graph"
      - context: "Slice factors are not connected to any constraint"
        action: "Computation starts"
        outcome: "Return immediately with all cells marked allowed (no constraint touches the slice)"

  SR-031:
    parent: [UR-003]
    category: forbidden_view
    function: "Render multi-factor forbidden-combination matrix slice"
    layout: |
      2D matrix. Rows = combinations of (N-1) condition-factor levels (nested).
      Columns = levels of the constrained factor. Cells show forbidden / allowed.
      Style follows PICT-PAPP's multi-factor forbidden table.
    scenarios:
      - context: "Evaluator produces a slice result"
        action: "View renders"
        outcome: "Display the matrix; forbidden cells are visually distinguished from allowed cells"

  SR-032:
    parent: [UR-003]
    category: forbidden_view
    function: "Configure matrix slice"
    scenarios:
      - context: "Forbidden view is open"
        action: "User chooses N (>= 2)"
        outcome: "Slice configurator updates to require N-1 condition factors and 1 constrained factor"
      - context: "User selects condition factors and constrained factor"
        action: "Selection is committed"
        outcome: "Matrix recomputes for the new slice"

  SR-033:
    parent: [UR-003]
    category: forbidden_view
    function: "Manage multiple matrix slices as switchable views"
    scenarios:
      - context: "User wants to compare slices"
        action: "User opens a new slice (different N or different factor selection)"
        outcome: "A new switchable view is added; previous views are retained for switching"
      - context: "Multiple slices exist"
        action: "User switches between them"
        outcome: "Show only the active slice (no parallel display)"

  SR-034:
    parent: [UR-003]
    category: forbidden_view
    function: "Suggest matrix slices from DSL constraints (per-constraint and propagation)"
    note: |
      Two kinds of suggestions are produced from the parsed DSL:
        (a) Per-constraint slices — each constraint maps to a slice with the
            condition factors on the row axis and each consequence factor on
            the column axis.
        (b) Propagation slices — factors that co-occur across multiple
            constraints form a connected component; for components of size
            >= 3, every pivot inside the component is suggested so chained
            restrictions (A -> B -> C cells forbidden via the chain rather
            than via any single constraint alone) become inspectable.
      Identical (sorted conditions, constrained-factor) pairs are deduplicated.
      See ADR-011 for the algorithm rationale.
    scenarios:
      - context: "Forbidden view is open and the DSL has at least one constraint"
        action: "User clicks the 'Suggest from constraints' control"
        outcome: "Suggested slices that are not already saved are appended as new switchable views; pre-existing slices are kept untouched"
      - context: "DSL has no constraints"
        action: "User clicks the suggestion control"
        outcome: "No slices are added; the user is informed that there is nothing to suggest"
      - context: "All suggestions are already present as saved slices"
        action: "User clicks the suggestion control"
        outcome: "No duplicates are added; existing slices remain"
      - context: "A constraint touches a single factor only"
        action: "Suggestions are computed"
        outcome: "That constraint contributes no slice (a 2D matrix needs at least two factors)"

# =============================================================================
# Coverage View / Exhaustive Matrix (parent: UR-004)
# =============================================================================
# Top pane. Exhaustive cross-tabulation of factors with PICT-generated
# occurrence counts overlaid.

  SR-040:
    parent: [UR-004]
    category: coverage_view
    function: "Render exhaustive cross-tabulation matrix in top pane"
    scenarios:
      - context: "Factor-Level table is non-empty"
        action: "Top pane renders"
        outcome: "Matrix shows all factor pairs (factor A x factor B) with all level combinations as cells"
      - context: "Test cases have not been generated yet"
        action: "Matrix renders"
        outcome: "Cells show the level-pair structure only; occurrence-count overlay is empty"

  SR-041:
    parent: [UR-004]
    category: coverage_view
    function: "Toggle factor visibility via per-row checkbox"
    scenarios:
      - context: "Matrix is displayed"
        action: "User toggles a factor's checkbox off"
        outcome: "That factor's row and column are hidden from the matrix"
      - context: "User toggles checkbox on"
        action: "Toggle event"
        outcome: "Factor reappears in the matrix; layout reflows"

  SR-042:
    parent: [UR-004]
    category: coverage_view
    function: "Overlay occurrence count from generated test cases"
    scenarios:
      - context: "Test cases exist"
        action: "Matrix renders"
        outcome: "Each cell shows how many test cases include that level pair"
      - context: "Cell occurrence count is zero and the pair is forbidden"
        action: "Matrix renders"
        outcome: "Mark cell as forbidden (visually distinct from missed)"
      - context: "Cell occurrence count is zero and the pair is allowed"
        action: "Matrix renders"
        outcome: "Mark cell as missed (warning style; e.g., yellow with '?')"

  SR-043:
    parent: [UR-004]
    category: coverage_view
    function: "Highlight uncovered non-forbidden combinations"
    scenarios:
      - context: "Generated test cases miss an allowed pair"
        action: "Matrix renders"
        outcome: "Highlight the missed cell prominently so the designer can investigate (indirect forbidden vs DSL bug vs PICT result quirk)"

  SR-044:
    parent: [UR-010, UR-004]
    category: coverage_view
    function: "Count only flagged-in cases toward coverage"
    note: |
      The count flag (SR-055) gates every coverage computation: occurrence
      overlay (SR-042), missed-cell marking (SR-043), and the coverage rate.
      A test case whose flag is off contributes nothing. This realizes
      "achieved coverage" — coverage that real, accepted runs have earned —
      as opposed to the planned coverage of a freshly generated set (where all
      cases are flagged in by default, so the two coincide initially).
    scenarios:
      - context: "Some test cases are flagged out (not counted)"
        action: "Coverage matrix / rate is computed"
        outcome: "Only flagged-in cases contribute occurrence counts and the rate; flagged-out cases are ignored entirely"
      - context: "An allowed pair is covered only by flagged-out cases"
        action: "Matrix renders"
        outcome: "Cell is shown as missed (same style as SR-043), so the lost coverage is visible"
      - context: "All cases are flagged in (e.g., a freshly generated set)"
        action: "Coverage is computed"
        outcome: "Result equals the planned coverage (no behavioral change from the pre-UR-010 baseline)"

# =============================================================================
# Test Case Table (parent: UR-001, UR-005, UR-010)
# =============================================================================

  SR-050:
    parent: [UR-001, UR-009]
    category: test_case_table
    function: "Display generated test cases"
    note: |
      One table serves both generation modes (SR-100). In pairwise / N-wise
      mode it shows the PICT-reduced set (no forbidden rows). In decision-table
      mode it shows the full Cartesian product — every row, including forbidden
      ones — with a forbidden-marker column (SR-102). Every displayed test case
      also carries a stable ID (SR-054) and a "count toward coverage" flag
      (SR-055); the notes column (SR-051) and export (SR-053) apply in both
      modes. Forbidden rows are not test cases: they get no ID, no count flag,
      and are excluded from coverage; their notes cell is editable but typically
      empty. This is the GUI surface only; the CLI and HTTP API render the same
      decision-table result in their own formats (SR-104 / SR-105).
    scenarios:
      - context: "Pairwise / N-wise generation has produced output"
        action: "Test cases tab is rendered"
        outcome: "Table shows one row per test case; columns are ID + count flag + factors + notes; no forbidden-marker column"
      - context: "Decision-table generation has produced output"
        action: "Test cases tab is rendered"
        outcome: "Table shows one row per full-factor combination; columns are ID + count flag + factors + forbidden marker + notes; forbidden rows have no ID and no flag"
      - context: "No generation has run yet"
        action: "Tab is rendered"
        outcome: "Show empty-state message with 'Generate' action"

  SR-051:
    parent: [UR-005]
    category: test_case_table
    function: "Provide a free-form notes column"
    note: |
      Column label "Notes / メモ・備考"; annotation key @neocombi:note. Formerly
      framed as an "expected value" — an expected result is one use among others
      (remarks, references, rationale), so the column is general free text.
    scenarios:
      - context: "Test case row exists"
        action: "User clicks the notes cell"
        outcome: "Cell becomes editable; user enters free text"
      - context: "A note is set"
        action: "Row renders"
        outcome: "Note text is displayed in the cell"

  SR-052:
    parent: [UR-005, UR-011]
    category: test_case_table
    function: "Keep notes and flags attached to their test cases"
    note: |
      The persisted test set (SR-072) keeps each note and count flag bound to its
      case ID, so loading restores them without regeneration. Matching is by
      stable case ID, never by display position. Explicit regeneration is the
      only thing that can drop them, and only behind the destructive-action guard
      (SR-073).
    scenarios:
      - context: "A project with notes / flags is reloaded"
        action: "Load runs"
        outcome: "Each note and flag is restored to its case by ID; no regeneration occurs"
      - context: "The user explicitly regenerates after confirming the guard (SR-073)"
        action: "Generation completes"
        outcome: "A fresh test set with fresh IDs replaces the old one; prior notes / flags are discarded as warned"
      - context: "A factor or level was renamed (display name only) while the saved set is kept"
        action: "Rename applies"
        outcome: "Saved rows and their notes / flags are unaffected (rows store level identity, not display text)"

  SR-053:
    parent: [UR-001, UR-005, UR-009, UR-010]
    category: test_case_table
    function: "Export test cases as CSV / JSON"
    scenarios:
      - context: "Test cases exist"
        action: "User selects 'Export as CSV'"
        outcome: "Emit CSV file with one row per test case, columns = ID + count flag + factors + notes"
      - context: "Test cases exist"
        action: "User selects 'Export as JSON'"
        outcome: "Emit JSON array with one object per test case, including id, count flag, and note"
      - context: "Current output is a decision table"
        action: "User exports"
        outcome: "Include the forbidden-marker column / field so the exported decision table preserves which rows are forbidden"

  SR-054:
    parent: [UR-010]
    category: test_case_table
    function: "Assign a stable ID to each test case"
    note: |
      Pairwise cases are "P" + a sequence number; decision-table cases are
      "D" + a sequence number. The number is zero-padded to the digit width of
      that table's case count (11 cases -> P01..P11; 1944 cases -> D0001..D1944).
      IDs are assigned at generation, persisted (SR-072), shown in the GUI, and
      reassigned only on explicit regeneration. Forbidden decision-table rows are
      not test cases and receive no ID.
    scenarios:
      - context: "A test set is generated"
        action: "Generation completes"
        outcome: "Each case gets an ID with the mode prefix and a width-matched sequence; the ID column is shown in the GUI"
      - context: "A project is reloaded"
        action: "Load runs"
        outcome: "IDs are restored verbatim from the file; they do not change"

  SR-055:
    parent: [UR-010]
    category: test_case_table
    function: "Provide a per-case 'count toward coverage' flag"
    note: |
      Binary, default = counted. Deliberately neutral ("counted / not counted"),
      not "pass / fail", so a team can map it to its own workflow. It gates all
      coverage computation (SR-044). Forbidden rows have no flag.
    scenarios:
      - context: "A test case row exists"
        action: "User toggles its count flag"
        outcome: "Flag flips; coverage (SR-044) recomputes immediately"
      - context: "A test case is newly generated"
        action: "Row renders"
        outcome: "Flag defaults to counted (in)"

  SR-056:
    parent: [UR-010]
    category: test_case_table
    function: "Write back results from a three-column CSV matched by ID"
    note: |
      A separate import path from any factor-column CSV: the round-trip file has
      exactly three columns — ID, count flag, note — with a header row
      'id,count,note' and the flag as true / false. Each row is matched to an
      existing case by ID; the case's flag and note are updated. This is how the
      external execution system writes results back into NeoCombi.
    scenarios:
      - context: "User imports a results CSV"
        action: "Import runs"
        outcome: "For each row whose ID matches a case, set that case's count flag and note from the CSV"
      - context: "A CSV row's ID matches no current case"
        action: "Import runs"
        outcome: "Skip that row and report it (e.g., 'N rows did not match any case'); do not create a case"
      - context: "Importing would overwrite existing flags / notes"
        action: "Import starts"
        outcome: "Apply the destructive-action guard (SR-073) before overwriting"

# =============================================================================
# PICT Invocation (parent: UR-001)
# =============================================================================
# PICT is an external CLI. It is not bundled. The user supplies the path.

  SR-060:
    parent: [UR-001]
    category: pict_invocation
    function: "Invoke PICT external CLI with DSL-derived input file"
    scenarios:
      - context: "DSL is valid; PICT path is configured"
        action: "User triggers generation"
        outcome: "Write a temporary PICT input file; spawn PICT with arguments; capture stdout"
      - context: "PICT exits with non-zero status"
        action: "Generation completes"
        outcome: "Show stderr text and exit code; test case table holds last successful state"
      - context: "PICT path is not configured or executable not found"
        action: "User triggers generation"
        outcome: "Show 'PICT not configured' error with a link to the configuration UI"

  SR-061:
    parent: [UR-001]
    category: pict_invocation
    function: "Configure PICT executable path"
    scenarios:
      - context: "Settings UI is open"
        action: "User selects PICT executable file"
        outcome: "Path is stored in user settings; value is persisted across sessions"
      - context: "Configured path no longer points to an executable"
        action: "Generation is triggered"
        outcome: "Show 'PICT executable not found' error with the stored path"

  SR-062:
    parent: [UR-001]
    category: pict_invocation
    function: "Configure generation order N"
    note: "N = 2 (pairwise) is the default. Higher N requests N-wise coverage from PICT."
    scenarios:
      - context: "User opens generation settings"
        action: "User sets N (integer >= 2)"
        outcome: "Setting is stored on the project; passed to PICT via /o:N argument on next run"

  SR-063:
    parent: [UR-001]
    category: pict_invocation
    function: "Parse PICT output into test case data"
    scenarios:
      - context: "PICT stdout is captured"
        action: "Parse runs"
        outcome: "Tab-separated rows become test case records; header row maps to factors"
      - context: "PICT output is malformed"
        action: "Parse runs"
        outcome: "Show parse error with the offending line; previous test cases are retained"

# =============================================================================
# Persistence (parent: UR-001, UR-002, UR-005, UR-006, UR-011)
# =============================================================================
# .tmodel file = single-file project. Contains DSL + the persisted test set
# (rows, ids, count flags, notes) + view state.

  SR-070:
    parent: [UR-001, UR-002, UR-005, UR-010, UR-011]
    category: persistence
    function: "Save project as .tmodel file"
    file_contents:
      - "DSL source text (single source of truth for factors, levels, constraints)"
      - "Persisted test set: each generated case with its ID, count flag, note, and level values (keyed by stable factor / level ids), so it reloads without regeneration"
      - "View state: current bottom-pane tab, factor-checkbox visibility, forbidden-view slice configurations"
      - "Generation settings: generation mode (pairwise/N-wise vs decision-table) and order N (PICT path is user-level, not project-level)"
    scenarios:
      - context: "Project has unsaved changes"
        action: "User selects 'Save'"
        outcome: "Write .tmodel file at the current path"
      - context: "Project has no path yet"
        action: "User selects 'Save'"
        outcome: "Prompt for a path; then write"

  SR-071:
    parent: [UR-001, UR-002, UR-005, UR-006, UR-011]
    category: persistence
    function: "Load project from .tmodel file"
    scenarios:
      - context: "User opens a .tmodel file with a persisted test set"
        action: "Load runs"
        outcome: "DSL, the test set (rows, IDs, count flags, notes), and view state are restored; NO regeneration runs; PICT settings reflect the loaded project"
      - context: "File is from an older format version"
        action: "Load runs"
        outcome: "Apply forward migration; if migration is impossible, show error without partial load"
      - context: "DSL inside file fails to parse"
        action: "Load runs"
        outcome: "Open the project anyway; surface DSL errors so the user can fix them in editor"

  SR-072:
    parent: [UR-011]
    category: persistence
    function: "Treat the persisted test set as authoritative; do not auto-regenerate"
    note: |
      The saved rows (with IDs, flags, notes) are the source of truth on load,
      because pairwise output is not guaranteed identical across PICT runs and
      the recorded flags / notes must stay bound to the exact rows tested.
      Regeneration is an explicit user action, never automatic on load or on
      project open.
    scenarios:
      - context: "A project with a persisted test set is opened"
        action: "Load completes"
        outcome: "The saved rows are shown as-is; generation is not invoked"
      - context: "The DSL parses cleanly on load"
        action: "Load completes"
        outcome: "Still no automatic regeneration; the user must invoke 'Re-generate' explicitly"

  SR-073:
    parent: [UR-011, UR-010, UR-005]
    category: persistence
    function: "Guard destructive actions when flags or notes exist"
    note: |
      Any action that would discard recorded count flags or notes — explicit
      regeneration, or a DSL edit that invalidates the saved set, or a results
      import that overwrites (SR-056) — must first confirm. The guard fires only
      when at least one flag or note is present; otherwise the action proceeds
      without prompting. Nothing recorded is discarded silently.
    scenarios:
      - context: "At least one count flag or note exists; user triggers a discarding action"
        action: "Action is requested"
        outcome: "Ask whether it is acceptable to lose all flags / notes; offer proceed or stay; do nothing until the user chooses"
      - context: "No flags or notes exist; user triggers the same action"
        action: "Action is requested"
        outcome: "Proceed without prompting"

# =============================================================================
# CLI Mode (parent: UR-006)
# =============================================================================
# Headless invocation for CI/CD. Same deterministic behavior as GUI generation.

  SR-080:
    parent: [UR-006, UR-009]
    category: cli_mode
    function: "Run NeoCombi as CLI consuming .tmodel input"
    scenarios:
      - context: "User runs 'neocombi generate <input.tmodel>'"
        action: "CLI executes"
        outcome: "Read .tmodel, invoke PICT, emit test cases (CSV by default) to stdout"
      - context: "User passes '--decision-table'"
        action: "CLI executes"
        outcome: "Generate the decision table via the built-in core (no PICT); behavior and exit codes are specified by SR-104 (atomic output; exit 5 on >4096)"
      - context: "User passes '--format json'"
        action: "CLI executes"
        outcome: "Emit JSON array instead of CSV"
      - context: "User passes '--output <file>'"
        action: "CLI executes"
