        outcome: "Same successful behavior; CLI and GUI are separate entry points sharing the engine layer"

# =============================================================================
# Mask-Level Authoring Assistance (parent: UR-008)
# =============================================================================
# Mask levels are a regular IF-THEN-driven operational technique inherited
# from PICT-PAPP — no DSL extension. NeoCombi adds purely UI-side assistance
# so designers can apply the technique consistently and not omit it by accident.

  SR-090:
    parent: [UR-008]
    category: mask_level
    function: "Recognize a level as the mask level via the fixed sentinel value _MASK_"
    convention: |
      A level whose value is exactly the string "_MASK_" (case-sensitive,
      leading and trailing underscores included) is treated by NeoCombi
      as the mask level for that factor. The same fixed token is used
      across all factors, so designers always type the same value and
      readers always see the same symbol.

      Rationale for the choice:
      - Inherits the "MASK" naming from PICT-PAPP, immediately
        recognizable to designers coming from the predecessor tool.
      - The leading and trailing underscores follow the widely
        understood "internal / framework-magic name" convention
        (Python's `_private`, `__dunder__`), signalling at a glance
        "this is not an ordinary level value".
      - Cross-tool conceptual link with the sibling tool NeoCEG, whose
        MASK constraint expresses the same authoring intent (a factor
        is inert under specific conditions). NeoCombi expresses it as
        a level value plus IF-THEN rather than as a constraint operator,
        but the underlying test-design concept is the same — and the
        shared "MASK" name keeps that connection visible.
      - Plain-ASCII underscores+letters: the token is a valid identifier
        in both NeoCombi's DSL and PICT, so the source can be passed
        directly to PICT with no translation layer (per ADR-001 the
        DSL is a strict subset of PICT). The author writes a bare
        `_MASK_` in the parameter declaration and a quoted `"_MASK_"`
        in constraint references, the same shape as every other
        non-numeric value in PICT.

      Constraints:
      - A factor has at most one `_MASK_` level. Duplicate declarations
        on the same factor are a model error.
      - The token is part of the level value itself — no separate
        data-model flag. Detection is exact string match.
      - The `_MASK_` level is rename-locked in the UI: editing the
        token's text would silently strip its mask semantics, so the
        Factor / Level table disallows in-place renaming. Removal and
        re-addition (via the "+ _MASK_" affordance) are the only edit
        paths.
    scenarios:
      - context: "Level value equals _MASK_"
        action: "Parser / table reads the level"
        outcome: "Level is tagged as the factor's mask level for downstream display and lint"
      - context: "Level value contains _MASK_ as a substring but not as the whole value"
        action: "Parser / table reads the level"
        outcome: "Treated as a regular level (only an exact match identifies the mask level)"
      - context: "A factor declares _MASK_ more than once"
        action: "Validation runs"
        outcome: "Emit a duplicate-declaration error"

  SR-091:
    parent: [UR-008]
    category: mask_level
    function: "Display mask levels distinctly across all level-displaying views"
    surfaces:
      - "Factor / Level table — level chip"
      - "Forbidden-combination matrix — column header (cell coloring stays as-is; the cue lives in the header)"
      - "Coverage matrix — row / column header (cell occurrence overlay stays as-is)"
      - "Test case table — cell whose value is the mask level"
    surfaces_excluded:
      - target: "DSL editor"
        reason: |
          The DSL editor is plain text (no syntax-highlight overlay in MVP).
          Adding mask-level styling there would require a syntax-highlighting
          editor migration, which is disproportionate to UR-008's scope. The
          DSL is the place authors actively write, so the recognition risk is
          lower than in views they passively read. If a syntax-highlighting
          editor is adopted later, mask-level styling should follow.
    style_intent: |
      Render the literal value "<MASK>" verbatim (no glyph substitution so
      copy-paste / CSV export carry the same string) but visually
      de-emphasize it: muted color plus italic weight, so the distinction
      uses two channels (color + style) and remains discernible under
      accessibility settings. Hover tooltip explains the mask semantics.
    scenarios:
      - context: "A factor has a mask level"
        action: "Any of the listed surfaces renders that level"
        outcome: "The mask level is visually distinct from regular levels using the same style across all surfaces"
      - context: "Theme / accessibility settings are applied"
        action: "View renders"
        outcome: "Distinction remains discernible (color is not the sole channel; shape / weight / glyph also carries the cue)"

  SR-092:
    parent: [UR-008]
    category: mask_level
    function: "Warn when a mask level has no triggering constraint"
    severity: warning
    note: |
      Severity is warning, not error: the model still parses and PICT
      generation is not blocked. The author may legitimately be in the
      middle of editing. A blocked-on-error policy would be hostile to
      iterative authoring, while silent acceptance is what UR-008 is
      explicitly preventing — so warning is the right middle ground.
    rule: |
      Each `_MASK_` level on factor F requires a complete binding: a
      constraint specifying when F is `_MASK_`, and a constraint
      specifying that F must not be `_MASK_` otherwise. Without these,
      PICT treats `_MASK_` as a regular level and pairs it with arbitrary
      values of other factors — generating test cases where F is in the
      mask state under conditions that should not allow it. The warning
      currently fires when no constraint binds F to `_MASK_` at all (the
      most common oversight); the reverse direction is part of the
      required spec but is not separately detected in this check.
    scenarios:
      - context: "Factor F declares _MASK_ level; no constraint binds F to _MASK_"
        action: "Validation runs"
        outcome: "Emit a warning diagnostic identifying F, with a hint that a triggering IF-THEN is missing and a sample form"
      - context: "At least one constraint binds F to _MASK_"
        action: "Validation runs"
        outcome: "No diagnostic emitted for this mask level"
      - context: "Factor has no mask level"
        action: "Validation runs"
        outcome: "Rule is inert; no diagnostic"
      - context: "User clicks the warning"
        action: "Click is dispatched"
        outcome: "Focus jumps to the Factor / Level table row for F (consistent with existing diagnostic-to-source navigation)"

# =============================================================================
# Decision-Table (All-Combination) Generation (parent: UR-009)
# =============================================================================
# Decision-table test design: enumerate the FULL Cartesian product of all
# factors' levels, keep every row, and MARK the forbidden ones (do not exclude)
# so the designer fills an expected result per row and each allowed row becomes
# a test case. Confirmed against PICT-PAPP's behavior by the tool's author. The
# complement of pairwise: pairwise (PICT) is for many factors where the product
# explodes; the decision table is for few factors where exhaustive coverage is
# wanted. Produced by NeoCombi's own pure-TypeScript core (PICT cannot emit a
# marked full product), which is shared in-process by three deployments — GUI,
# CLI, and HTTP API — each with a different configuration (see SR-104/105 and
# Requirements_Specification.md "Decision-table architecture").
#
# The one internal contract every deployment depends on:
#   generateDecisionTable(model) -> DecisionTableResult
#     | { ok: true;  columns; rows: [{ values; forbidden }] }
#     | { ok: false; reason: 'too-large';     count; limit: 4096 }
#     | { ok: false; reason: 'invalid-model'; diagnostics }
#   Pure, synchronous, no IO/DOM/HTTP. Returns a COMPLETE table or an error —
#   never a partial table. CLI exit codes and HTTP status codes are both just a
#   mapping of these three result variants.

  SR-100:
    parent: [UR-001, UR-009]
    category: all_combinations
    function: "Select test-case generation mode (pairwise / N-wise vs decision-table)"
    note: |
      The GUI generation control offers two modes. Pairwise / N-wise routes to
      PICT with /o:N (SR-060/062). Decision-table routes to the built-in core
      (SR-101) and does not require a configured PICT path. The chosen mode is
      persisted on the project (SR-070). This SR is the GUI surface; the CLI
      and HTTP API expose the same decision-table core via SR-104 / SR-105.
    scenarios:
      - context: "User opens the generation control"
        action: "User selects a generation mode"
        outcome: "The selected mode is stored on the project and used on the next generation run"
      - context: "Decision-table mode is selected and PICT is not configured"
        action: "User triggers generation"
        outcome: "Generation proceeds (PICT is not needed for this mode)"

  SR-101:
    parent: [UR-009]
    category: all_combinations
    function: "Generate the decision table via the built-in core (the shared contract)"
    note: |
      generateDecisionTable(model) is a PURE engine-layer function (no IO / DOM /
      HTTP, synchronous, deterministic). It is the single contract that the GUI
      (SR-100), CLI (SR-104), and HTTP API (SR-105) all consume — they are thin
      adapters that map its result to their environment. It reuses the built-in
      evaluator's Cartesian enumeration (SR-030) for forbidden marking, so the
      decision table never disagrees with the forbidden view.

      It returns one of exactly three results and NEVER a partial table:
        - ok:           { columns, rows: [{ values, forbidden }] } — every
                        full-factor combination in declared order, each marked
                        forbidden or allowed (SR-102).
        - too-large:    { count, limit: 4096 } when the product exceeds 4096
                        (SR-103); nothing is enumerated.
        - invalid-model:{ diagnostics } when the DSL does not parse / validate.
      Because the cap is 4096, the whole result fits in memory and is returned
      atomically; there is no streaming and therefore no way to emit a partial.
    scenarios:
      - context: "DSL is valid and the product is within 4096"
        action: "Core is called"
        outcome: "Returns ok with every combination as a row in declared-factor order, each evaluated for forbidden status"
      - context: "The model has no constraints"
        action: "Core is called"
        outcome: "Returns ok with the full Cartesian product and no row marked forbidden"
      - context: "DSL is invalid"
        action: "Core is called"
        outcome: "Returns invalid-model with diagnostics; no table is produced"

  SR-102:
    parent: [UR-009, UR-003]
    category: all_combinations
    function: "Mark forbidden rows in the decision table"
    note: |
      Each enumerated row is evaluated against the DSL constraints by the same
      built-in evaluator that computes the forbidden view (UR-003). Forbidden
      rows are marked (a forbidden flag per row; in the GUI a marker column plus
      row styling) and REMAIN in the table rather than being removed, so the
      designer sees which combinations are infeasible and which allowed rows are
      the test cases. The forbidden flag travels in the data model, so CSV / JSON
      export and the HTTP API response carry it too (SR-053 / SR-105).
    scenarios:
      - context: "An enumerated row violates at least one constraint"
        action: "Result is produced"
        outcome: "Row carries forbidden=true and is visually distinguished in the GUI; it is retained, not dropped"
      - context: "An enumerated row satisfies all constraints"
        action: "Result is produced"
        outcome: "Row carries forbidden=false (an allowed / executable test case)"

  SR-103:
    parent: [UR-009]
    category: all_combinations
    function: "Refuse decision-table generation above 4096 combinations"
    note: |
      The product of each factor's level count is computed BEFORE enumeration.
      Because forbidden rows are kept, no constraint filtering reduces the row
      count — the raw product is exactly the output size. The limit is applied
      to the RAW PRODUCT (not the valid/non-forbidden count) on purpose: the
      valid count cannot be known without enumerating, and bounding the product
      gives a predictable ceiling on enumeration time and on rows rendered in
      the browser. The fixed limit is 4096 — large enough for realistic small
      models even when constraints forbid most rows (e.g. a 1080-row model with
      only ~190 valid cases now generates), yet small enough to stay responsive
      as a plain in-browser table. It is specific to the decision table and is
      NOT the forbidden view's enumeration limit — the two are independent.
      Above 4096 the core returns too-large and nothing is enumerated (no
      partial output).
    scenarios:
      - context: "The product exceeds 4096"
        action: "Core is called"
        outcome: "Returns too-large with the computed count and limit 4096; nothing is enumerated and no rows are produced"
      - context: "The product is 4096 or fewer"
        action: "Core is called"
        outcome: "Enumeration proceeds (SR-101)"

  SR-104:
    parent: [UR-006, UR-009]
    category: all_combinations
    function: "Expose the decision table via the CLI"
    note: |
      CLI configuration: a single Node process (typically on a CI runner) reads
      the .tmodel, calls generateDecisionTable(model) in-process (no PICT, no
      network), and maps the result to stdout/file plus an exit code. Output is
      ATOMIC — a complete table or nothing; a partial table is never written.
      Invocation:
        neocombi generate <model.tmodel> --decision-table
          [--format csv|json] [--output <file>]
      Exit codes (each code has ONE meaning tool-wide; 2 = PICT failure is
      reserved for pairwise and never used here):
        0  ok            — complete table written
        1  invalid-model — DSL parse / validation error (stderr)
        3  input file not found / unreadable
        4  output write failed
        5  too-large     — product > 4096 (stderr: count and limit); NEW code,
                           chosen so CI can distinguish "model too big" from a
                           DSL error and so it never collides with PICT's codes
    scenarios:
      - context: "DSL valid, product within 4096"
        action: "CLI runs with --decision-table"
        outcome: "Write the complete CSV/JSON to stdout (or --output); exit 0"
      - context: "Product exceeds 4096"
        action: "CLI runs"
        outcome: "Write nothing to stdout; print count and limit to stderr; exit 5"
      - context: "DSL is invalid"
        action: "CLI runs"
        outcome: "Write nothing to stdout; print diagnostics to stderr; exit 1"

  SR-105:
    parent: [UR-006, UR-009]
    category: all_combinations
    function: "Expose the decision table via the HTTP API"
    note: |
      API configuration: the existing pict-service (Node, containerized) gains a
      second endpoint beside POST /generate (pairwise -> spawns PICT). The new
      endpoint calls generateDecisionTable(model) in-process (no PICT needed for
      this route). A remote caller (CI/CD, another server) invokes it over the
      network. The response is ATOMIC — a complete table or an error; never a
      partial body.
        POST /decision-table        body = DSL source text
          200  { columns, rows: [{ values, forbidden }] }   — ok
          400  { reason: 'invalid-model', diagnostics }      — DSL error
          413  { reason: 'too-large', count, limit: 4096 }    — product > 4096
      The pairwise endpoint (POST /generate?order=N -> TSV) is unchanged; the
      API server therefore carries both the PICT binary (for /generate) and the
      pure-TS core (for /decision-table).
    scenarios:
      - context: "DSL valid, product within 4096"
        action: "Client POSTs /decision-table"
        outcome: "200 with the complete decision-table JSON (rows carry the forbidden flag)"
      - context: "Product exceeds 4096"
        action: "Client POSTs /decision-table"
        outcome: "413 with reason 'too-large', the count, and limit 4096; no table body"
      - context: "DSL is invalid"
        action: "Client POSTs /decision-table"
        outcome: "400 with reason 'invalid-model' and diagnostics; no table body"
