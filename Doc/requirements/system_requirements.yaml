  SR-082:
    parent: [UR-006, UR-009]
    category: cli_mode
    function: "Run headless without GUI dependencies"
    note: |
      Applies to BOTH generation modes. Pairwise / N-wise gets a headless path
      for free because its engine is the external PICT CLI, spawned identically
      from GUI and CLI (SR-060/080). The decision table has NO such external CLI
      to inherit — its engine is the built-in pure-TS core (SR-101) — so that
      core lives in the shared engine layer (ADR-004) and is callable headless,
      with the GUI (SR-100), CLI (SR-104), and HTTP API (SR-105) as the three
      thin consumers of that one core. The CLI and API forms are co-equal
      requirements of UR-009, not optional add-ons.
    scenarios:
      - context: "Environment has no display server (headless CI)"
