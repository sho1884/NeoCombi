# NeoCombi User Requirements
# Format: Task expression with background context.
# Priority: high | medium | future.
#   - high / medium: in-scope for MVP.
#   - future: out-of-scope for MVP, recorded so MVP design choices stay compatible.
# See Doc/PROJECT_KICKOFF.md for the architectural rationale and final vision.

version: "0.2-draft"
last_updated: "2026-06-19"

requirements:
  UR-001:
    task: "Generate pairwise test cases"
    background: >
      Pairwise (or N-wise) test case generation is the core function inherited
      from the predecessor tool PICT-PAPP. NeoCombi delegates the generation
      algorithm to Microsoft PICT, invoked as an external CLI, and concentrates
      on pre/post processing (DSL authoring, visualization, output shaping).
    priority: high

  UR-002:
    task: "Author factors, levels, and constraints"
    background: >
      Test designers express the problem space as factors and their levels,
      and rule out infeasible combinations via constraints. Constraints are
      written directly in the PICT DSL (subset; see DSL_Grammar_Specification.md).
      Factor-level table and DSL editor share the bottom pane and are switched
      by tabs.
    priority: high

  UR-003:
    task: "Verify forbidden combinations derived from constraints"
    background: >
      Constraint expressions (intensional form) imply a set of forbidden
      N-factor combinations (extensional form). Designers want to confirm
      visually whether the derived forbidden set matches their intent.
      The view is read-only — computed by NeoCombi's built-in DSL evaluator,
      not edited directly. N is selectable; the matrix shows one slice
      (condition factors x constrained factor) at a time.
    priority: high

  UR-004:
    task: "Verify pair coverage of generated test cases"
    background: >
      After PICT generates the test cases, designers want to confirm that
      each factor pair is covered (or distinguish forbidden pairs from
      missed pairs). Occurrence counts are overlaid on the exhaustive
      (cross-tabulation) matrix in the top pane. Per-factor checkboxes
      let the designer narrow which factors participate in the matrix.
    priority: medium

  UR-005:
    task: "Record expected values for test cases"
    background: >
      Test cases without expected outputs are not executable. NeoCombi adds
      an "expected value" column to each generated test case so the designer
      can fill in the predicted result per row. This column is preserved
      across regenerations as long as factor / level identity is stable.
      (Feature not present in the original PICT-PAPP.)
    priority: high

  UR-006:
    task: "Invoke from CI/CD pipeline deterministically"
    background: >
      Test design should be reproducible from version-controlled inputs.
      NeoCombi provides a CLI mode that consumes a .tmodel source file and
      emits CSV/JSON outputs without requiring the GUI, suitable for use
      as a UNIX-style filter in CI pipelines. Identical inputs always
      produce identical outputs (no AI, no nondeterminism).
    priority: medium

  UR-007:
    task: "Draft DSL from natural-language requirements via AI"
    background: >
      Final vision (out of MVP scope): designers describe the test target
      in natural language in a dedicated bottom-pane tab, AI generates the
      PICT DSL via n8n integration, and humans review and refine it.
      NeoCombi remains a deterministic transformer at its core; AI is an
      external pass-through, never embedded.
      MVP only fixes the bottom-pane layout and data model so this can be
      added later without rework. Deferred until ModelLogue's n8n integration
      pattern matures, at which point NeoCombi follows the same pattern.
    priority: future

  UR-008:
    task: "Make mask levels easy to author and hard to forget"
    background: >
      A "mask level" represents the state where a factor is unreachable
      because of other factors' values — e.g., the card-number factor is
      effectively absent when payment-method is cash. Per the predecessor
      PICT-PAPP convention (which NeoCombi inherits unchanged), this is
      handled purely operationally: the designer adds a dedicated level
      to the affected factor (PICT-PAPP names it "MASK" but the choice is
      free) and writes an IF-THEN constraint that pins the factor to that
      level under the trigger condition. The existing PICT DSL handles
      this with no extension, no new operator, no new data model.

      The risk highlighted by PICT-PAPP's author: if the designer forgets
      to introduce the mask level, the generated test cases silently drop
      the masked situation from coverage. Every generated case is
      executable, so the omission is invisible — the gap is only noticed
      when a tester wonders why a particular condition was never tried.

      NeoCombi adds two UI affordances on top of the unchanged DSL:
      - A distinct symbol for entering and displaying mask levels so they
        read differently from regular levels at a glance, both in the
        factor-level table and wherever the level appears (matrix cells,
        DSL editor, generated test cases).
      - A defect-flagging lint: when a factor declares a mask level but
        no constraint references that level, surface it as a missing
        binding the designer should resolve (a mask level with no
        triggering condition is almost always an incomplete model).
    priority: medium

  UR-009:
    task: "Design test cases with a decision table (all-combination generation)"
    background: >
      Decision-table test design: when the factor set is small, the designer
      wants every combination of the factors' levels laid out, the infeasible
      ones marked, and an expected result filled per combination — each allowed
      combination then being a test case. This is the predecessor tool
      PICT-PAPP's "all-combination (decision-table)" feature, which NeoCombi
      inherits but is currently missing. It is the complement of pairwise
      (UR-001): pairwise (PICT) is for many factors where the full product
      explodes; the decision table is for few factors where exhaustive coverage
      is the goal. The designer chooses between the two as a generation mode.

      Confirmed against PICT-PAPP's behavior (by the tool's author): the table
      is the FULL Cartesian product of all factors' levels with EVERY row kept
      and the forbidden rows MARKED, not excluded. Forbidden marking reuses
      NeoCombi's built-in DSL evaluator (the same one behind the forbidden view,
      UR-003), so PICT is not involved — PICT cannot emit a marked full product.
      The expected-value column (UR-005) and CSV/JSON export apply.

      Scale guardrail: because forbidden rows are kept, the product is not
      reduced, so generation is refused when the product exceeds 4096
      combinations (a decision table is a small-factor-set technique, but a
      user may build an oversized model anyway). The count and the limit are
      shown; nothing partial is produced.

      Three deployments, each a co-equal deliverable, each a DIFFERENT
      configuration of one shared pure-TypeScript core:
        - GUI (browser): the core runs in-browser; the decision table is a
          generation mode of the test case table.
        - CLI (Node, CI/CD): the core runs in one process; reads .tmodel, writes
          CSV/JSON or fails with an exit code. No PICT, no network.
        - HTTP API (server, CI/CD): the core runs in the service (the existing
          pict-service gains a /decision-table endpoint beside /generate); a
          remote caller invokes it over the network.
      What matters is that it can be embedded in a CI/CD pipeline as either a
      CLI or an API. Output is atomic in every deployment — a complete table or
      a clean error; a partial table is never emitted. The detailed interfaces
      (core contract, CLI exit codes, HTTP status codes) and the three
      configuration diagrams are in the system requirements and
      Requirements_Specification.md.
    priority: high
