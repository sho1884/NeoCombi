  - "ADR-008（期待値列 → メモ列への再定義、UR-005）"
  - "Doc/requirements/user_requirements.yaml UR-010 / UR-011"
  - "Doc/requirements/system_requirements.yaml SR-070..073"
  - "src/services/projectFile.ts"
