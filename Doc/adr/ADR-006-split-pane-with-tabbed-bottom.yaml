id: ADR-006
title: "UI を上下 2 ペーンとし、下ペーンはタブ切替式にする"
date: "2026-05-02"
status: accepted
superseded_by: null

participants:
  author: "sho1884"
  approver: "sho1884"
  last_updated: "2026-05-02"

context:
  problem: |
    GUI のレイアウトをどう構成するか。PICT-PAPP は Excel シート切替式で、画面分割という概念が
    薄かった。NeoCombi は上下分割案（上：総当たり表、下：因子水準表 / DSL / テストケース）が
    自然と思われるが、将来 AI 連携で「自然言語要求仕様」タブが追加される（UR-007）ことを
    考慮する必要がある。また下ペーンの 3〜4 領域を一度に並べるか、タブで切り替えるかも選択肢。
  drivers:
    - "総当たり表（コア可視化）と入力表（DSL 等）を同時に見たい"
    - "因子数が 100〜300 になった場合、限られた画面幅で複数領域を並べると見づらくなる"
    - "AI 連携 ON 時は右にチャットペーン、下ペーンに NL 仕様タブが加わる（ADR-003）"

decision:
  summary: "UI を上下 2 ペーンに分け、下ペーンは「因子水準 / DSL / テストケース」のタブ切替とする"
  detail: |
    上ペーンは総当たり表 / 多項間禁則表（参照ビュー）を表示するエリア（SR-040..043、SR-030..033）。
    各因子の行にチェックボックスを置き、表示対象因子を絞れる（SR-041）。
    下ペーンは「因子水準 / DSL / テストケース」の 3 タブをタブヘッダで切替（SR-020）。
    将来 AI 連携 ON 時に「自然言語要求仕様」タブが追加されて 4 タブに拡張可能（タブコンテナを
    最初から可変要素数前提で設計）。AI 連携 ON 時はさらに右ペーンにチャットを表示する。
    タブ切替を採用した理由は (1) 100〜300 因子で各領域に十分な画面幅を確保するため、
    (2) 複数領域並列表示は同時に見たい場面が少なく、視認性が下がるため。

neglected:
  - option: "下ペーンを 4 分割（縦 2 × 横 2）で常時並列表示"
    because: "100〜300 因子の HAYST 規模では各領域が狭くなり読みにくい。リサイザー多用は UX 後退"
  - option: "アコーディオン式（折りたたみ）"
    because: "領域切替の操作が暗黙的で、タブほど明確ではない"
  - option: "上ペーンを廃し、すべてを下ペーンタブに統合"
    because: "総当たり表は『編集と並行して常時見たい』用途であり、タブに隠すと UX を損なう"

consequences:
  positive:
    - "100〜300 因子規模で視認性を確保"
    - "AI 連携時の 4 タブ拡張がレイアウト破綻なく可能"
    - "上ペーンと下ペーンの責務が明確（可視化 vs 編集）"
  negative:
    - "下ペーン内で「因子水準」と「テストケース」を見比べたいときはタブ切替が必要"
    - "タブ切替の状態を .tmodel に保存する必要"
  risks:
    - "AI 連携 ON / OFF 切替で右ペーン・タブセットが変動するため、レイアウト遷移の実装が複雑になる可能性"

references:
  - "Doc/PROJECT_KICKOFF.md §1 最終ビジョン"
  - "Doc/requirements/system_requirements.yaml SR-020, SR-040..043"
  - "ADR-003"
  - "ADR-007"
