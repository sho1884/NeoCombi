id: ADR-011
title: "禁則 slice の自動提案は『制約共起グラフの連結成分 + 全ピボット展開』で行う"
date: "2026-05-03"
status: accepted
superseded_by: null

participants:
  author: "sho1884"
  approver: "sho1884"
  last_updated: "2026-05-03"

context:
  problem: |
    SR-032 では禁則ビューの slice（行軸＝条件因子群／列軸＝被制約因子）を
    ユーザが手動で構成する。100〜300 因子規模を想定すると、どの組合せを見れば
    良いかをユーザが判断するのは現実的ではない。さらに、ある制約に登場する
    因子が別の制約にも登場するとき、両制約は連鎖して効く（例：
    `IF A=1 THEN B=1; IF B=1 THEN C=0;` では A=1 → C≠0 が伝播的に禁則になる）。
    手動 slice 構成だけではこの伝播効果が見落とされやすい。
  drivers:
    - "DSL 一次・マトリクスは参照ビューという ADR-007 の枠を維持しつつ、参照効率を上げたい"
    - "PICT-PAPP には伝播提案機能はなく、NeoCombi の付加価値として差別化できる"
    - "MVP では実装複雑度を上げず、決定論的に提案できる仕組みが望ましい"
    - "因子数が増えても提案アルゴリズム自体は線形〜準線形で済む構造であること"

decision:
  summary: "DSL 制約集合から共起グラフを作り、Union-Find で連結成分を求め、サイズ ≥3 の各成分について全因子を順にピボットした slice を発行する"
  detail: |
    extractSuggestedSlices は次の 2 段階で slice を提案する：

    1. **Per-constraint slices**：各制約について、条件側因子集合（IF 部 / 無条件
       Predicate の前段因子）を行軸、結果側因子（THEN/ELSE 内の新規因子、
       または無条件 Predicate の最後の因子）を列軸とする slice を発行する。
       条件と結果が同じ因子集合内で完結する自己制約の場合は、各因子を順に
       ピボットして他因子を条件側に置いた slice を発行する。

    2. **Propagation slices**：「同じ制約内に共起する」関係で因子を結合した
       Union-Find により連結成分を求める。サイズが 3 以上の成分について、
       成分内の各因子を順に被制約軸（列軸）に据え、残りの因子を条件軸に
       並べた slice を発行する。サイズ 2 の成分は per-constraint で完全
       カバーされるため除外する。

    重複検出は `(sorted(conditions), constrained)` をキーに 1 度だけ発行する
    ことで保証する。マトリクスは可換（行軸と列軸は数学的には対等）なので、
    向きを尊重して 1 ピボットだけ出すより、全ピボットを出して見落としを
    防ぐ方を優先する。

neglected:
  - option: "THEN/ELSE の意味論的方向だけを尊重し、ピボットを 1 方向に固定する"
    because: "禁則マトリクスは 2D で行・列の役割は可換。固定するとユーザが見たい軸を選べず、伝播の見落としが残る"
  - option: "Union-Find ではなく BFS/DFS で成分を求める"
    because: "計算量は同等。Union-Find は実装が短く、将来制約を増分追加する拡張にも乗りやすい"
  - option: "成分サイズ 2 もピボットして提案"
    because: "size 2 は per-constraint と完全に一致するため、dedup を通れば slice 数は変わらず、コードが冗長になるだけ"
  - option: "提案 ON/OFF を UI の設定で切り替えさせる"
    because: "提案は『追加候補を示す』だけで dedup により副作用なし。MVP では設定項目を増やさない方を選んだ"
  - option: "AI に提案させる（自然言語で『どの slice を見るべき？』と問う）"
    because: "ADR-003 により本体に AI を組み込まない。決定論変換器として CLI でも同じ結果が再現できることを優先"

consequences:
  positive:
    - "A → B → C のような連鎖禁則を 1 クリックで slice 化できる"
    - "Union-Find は線形に近く、因子数が増えても提案コストはほぼ問題にならない"
    - "決定論的：同じ DSL からは常に同じ slice 集合が提案される（CLI モードでも再現可能）"
    - "PICT 非依存（ADR-005 の内製 evaluator 上で動く）"
  negative:
    - "成分サイズ n の連結成分から n 個の slice が生成されるため、密結合な制約セットでは提案数が成分サイズに比例して増える"
    - "100 因子規模で全因子が 1 つの大連結成分になるケースでは提案数が爆発する可能性がある"
  risks:
    - "大規模モデルでの提案数爆発に対し、件数キャップや成分サイズキャップ（例：成分サイズ ≥ K の場合は警告して候補を間引く）が将来的に必要になる可能性"
    - "ユーザが 1 クリックで全 slice を一括追加すると、タブ列が長大化してスクロール UX が悪化する可能性"

references:
