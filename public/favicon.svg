<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeoCombi">
  <title>NeoCombi</title>
  <defs>
    <radialGradient id="g-cyan" cx="0.35" cy="0.35">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <radialGradient id="g-pink" cx="0.35" cy="0.35">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#be185d"/>
    </radialGradient>
    <radialGradient id="g-amber" cx="0.35" cy="0.35">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="g-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="dot-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="0.9" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <!-- Deep navy background. -->
  <rect width="64" height="64" rx="12" fill="url(#g-bg)"/>
  <!-- K3: complete graph on 3 nodes. Nodes = factors, edges = pairs.
       This is literally the smallest pairwise-coverage graph and the
       core idea NeoCombi exists to compute. -->
  <g stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round" opacity="0.78">
    <line x1="32" y1="20" x2="20" y2="42"/>
    <line x1="32" y1="20" x2="44" y2="42"/>
    <line x1="20" y1="42" x2="44" y2="42"/>
  </g>
  <g filter="url(#dot-shadow)">
    <circle cx="32" cy="20" r="8.5" fill="url(#g-cyan)"/>
    <circle cx="20" cy="42" r="8.5" fill="url(#g-pink)"/>
    <circle cx="44" cy="42" r="8.5" fill="url(#g-amber)"/>
  </g>
</svg>
