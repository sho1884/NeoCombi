<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeoCombi">
  <title>NeoCombi</title>
  <defs>
    <radialGradient id="g-node" cx="0.35" cy="0.35">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <linearGradient id="g-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="dot-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.6" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#g-bg)"/>
  <!-- K5: complete graph on 5 nodes — every pair of factors connected.
       All 10 edges drawn so the pentagram in the middle reads as
       "every combination covered". Single accent color (teal) keeps
       the icon calm rather than playful. -->
  <g stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="32" y1="14" x2="15" y2="27"/>
    <line x1="32" y1="14" x2="21" y2="47"/>
    <line x1="32" y1="14" x2="43" y2="47"/>
    <line x1="32" y1="14" x2="49" y2="27"/>
    <line x1="15" y1="27" x2="21" y2="47"/>
    <line x1="15" y1="27" x2="43" y2="47"/>
    <line x1="15" y1="27" x2="49" y2="27"/>
    <line x1="21" y1="47" x2="43" y2="47"/>
    <line x1="21" y1="47" x2="49" y2="27"/>
    <line x1="43" y1="47" x2="49" y2="27"/>
  </g>
  <g filter="url(#dot-shadow)">
    <circle cx="32" cy="14" r="5.5" fill="url(#g-node)"/>
    <circle cx="15" cy="27" r="5.5" fill="url(#g-node)"/>
    <circle cx="21" cy="47" r="5.5" fill="url(#g-node)"/>
    <circle cx="43" cy="47" r="5.5" fill="url(#g-node)"/>
    <circle cx="49" cy="27" r="5.5" fill="url(#g-node)"/>
  </g>
</svg>
