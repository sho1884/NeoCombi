  </defs>
  <!-- Maskable: full-bleed background. -->
  <rect width="64" height="64" fill="url(#g-bg)"/>
  <g stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <line x1="32" y1="14" x2="15" y2="27"/>
    <line x1="32" y1="14" x2="21" y2="47"/>
    <line x1="32" y1="14" x2="43" y2="47"/>
    <line x1="32" y1="14" x2="49" y2="27"/>
    <line x1="15" y1="27" x2="21" y2="47"/>
    <line x1="15" y1="27" x2="43" y2="47"/>
    <line x1="15" y1="27" x2="49" y2="27"/>
    <line x1="21" y1="47" x2="43" y2="47"/>
    <line x1="21" y1="47" x2="49" y2="27"/>
    <line x1="43" y1="47" x2="49" y2="27"/>
  </g>
  <g filter="url(#dot-shadow)">
    <circle cx="32" cy="14" r="5.5" fill="url(#g-node)"/>
    <circle cx="15" cy="27" r="5.5" fill="url(#g-node)"/>
    <circle cx="21" cy="47" r="5.5" fill="url(#g-node)"/>
    <circle cx="43" cy="47" r="5.5" fill="url(#g-node)"/>
    <circle cx="49" cy="27" r="5.5" fill="url(#g-node)"/>
