<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeoCombi">
  <title>NeoCombi</title>
  <defs>
    <linearGradient id="g-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <linearGradient id="g-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="0.8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Maskable: full-bleed background; tiles sit inside the ~80% safe zone. -->
  <rect width="64" height="64" fill="url(#g-bg)"/>
  <g filter="url(#shadow)">
    <rect x="13" y="13" width="17" height="17" rx="3" fill="url(#g-teal)"/>
    <rect x="34" y="13" width="17" height="17" rx="3" fill="url(#g-indigo)"/>
    <rect x="34" y="34" width="17" height="17" rx="3" fill="url(#g-amber)"/>
    <rect x="13" y="34" width="17" height="17" rx="3" fill="url(#g-red)"/>
    <path d="M18 39 L26 47 M26 39 L18 47" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
  </g>
</svg>
