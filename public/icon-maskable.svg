<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeoCombi">
  <title>NeoCombi</title>
  <!-- Maskable variant: full-bleed background fills the canvas so the OS
       can clip it to its platform-preferred shape (circle on Android,
       squircle on iOS) without leaving transparent corners. The matrix
       sits inside the ~80% safe zone. -->
  <rect width="64" height="64" fill="#eceff1"/>
  <g>
    <rect x="14" y="14" width="16" height="16" rx="2" fill="#37474f"/>
    <rect x="34" y="14" width="16" height="16" rx="2" fill="#37474f"/>
    <rect x="34" y="34" width="16" height="16" rx="2" fill="#37474f"/>
    <rect x="14" y="34" width="16" height="16" rx="2" fill="#ffcdd2" stroke="#b71c1c" stroke-width="1.5"/>
    <path d="M18 38 L26 46 M26 38 L18 46" stroke="#b71c1c" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
